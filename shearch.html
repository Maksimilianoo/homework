<!DOCTYPE html>
<html>
    <head>
        <title>Пошук</title>
    </head>
    <body>
        <h1>Пошук</h1>
        <form action="search.php" method="GET">
            <label for="body_type">Тип кузова:</label>
            <select id="body_type" name="body_type">
                <option value="sedan">Седан</option>
                <option value="suv">Позашляховик</option>
                <option value="hatchback">Хетчбек</option>
                <!-- Додайте інші варіанти типів кузова --></select
            ><br /><br />

            <label for="brand">Марка авто:</label>
            <input type="text" id="brand" name="brand" /><br /><br />

            <label for="manufacturer_country">Країна виробник:</label>
            <input
                type="text"
                id="manufacturer_country"
                name="manufacturer_country"
            /><br /><br />

            <label for="price_from">Ціна (від):</label>
            <input
                type="number"
                id="price_from"
                name="price_from"
            /><br /><br />

            <label for="price_to">Ціна (до):</label>
            <input type="number" id="price_to" name="price_to" /><br /><br />

            <label for="year_from">Рік випуску (від):</label>
            <input type="number" id="year_from" name="year_from" /><br /><br />

            <label for="year_to">Рік випуску (до):</label>
            <input type="number" id="year_to" name="year_to" /><br /><br />

            <label for="condition">Стан:</label>
            <input
                type="checkbox"
                id="condition"
                name="condition"
                value="damaged"
            />Бита
            <input
                type="checkbox"
                id="condition1"
                name="condition"
                value="financed"
            />У кредиті
            <input
                type="checkbox"
                id="condition2"
                name="condition"
                value="not_customs_cleared"
            />Нерозмитнена
            <!-- Додайте інші варіанти стану -->

            <br /><br />

            <label for="fuel_type">Тип палива:</label>
            <select id="fuel_type" name="fuel_type">
                <option value="gasoline">Бензин</option>
                <option value="diesel">Дизель</option>
                <option value="electric">Електро</option>
                <!-- Додайте інші варіанти типів палива --></select
            ><br /><br />

            <label for="transmission">Тип коробки передач:</label>
            <select id="transmission" name="transmission">
                <option value="manual">Механічна</option>
                <option value="automatic">Автоматична</option>
                <!-- Додайте інші варіанти типів коробки передач --></select
            ><br /><br />

            <label for="color">Колір:</label>
            <input type="text" id="color" name="color" /><br /><br />

            <label for="comfort">Комфорт:</label>
            <input
                type="checkbox"
                id="comfort"
                name="comfort"
                value="sunroof"
            />Люк
            <input
                type="checkbox"
                id="comfort1"
                name="comfort"
                value="leather_seats"
            />Шкіряний салон
            <!-- Додайте інші варіанти комфорту -->

            <br /><br />

            <input type="submit" value="Шукати" />
        </form>
    </body>
</html>
