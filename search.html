<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Search</title>
    </head>
    <body>
        <h1>Пошук</h1>
        <form action="https://fom.in.ua/echo" method="post">
            <label for="body_type">Тип кузова:</label>
            <input type="text" id="body_type" name="Тип кузова" />
            <br />
            <label for="car_brand">Марка авто:</label>
            <input type="text" id="car_brand" name="Марка авто" />
            <br />
            <label for="country">Країна виробник:</label>
            <input type="text" id="country" name="Країна виробник" />
            <br />
            <label for="price_width">Ціна (від):</label>
            <input type="number" id="price_width" name="Ціна (від)" />
            <br />
            <label for="price_to">Ціна (до):</label>
            <input type="number" id="price_to" name="Ціна (до)" />
            <br />
            <label for="year_from">Рік випуску (від):</label>
            <input type="number" id="year_from" name="Рік випуску (від)" />
            <br />
            <label for="year_to">Рік випуску (до):</label>
            <input type="number" id="year_to" name="Рік випуску (до)" />
            <br />
            <label for="condition">Стан:</label>
            <select id="condition" name="Стан">
                <option value="Битa">Битa</option>
                <option value="У кредиті">У кредиті</option>
                <option value="Нерозмитнена">Нерозмитнена</option>
                <option value="Ідеал">Ідеал</option>
            </select>
            <br />
            <label for="fuel_type">Тип палива:</label>
            <select name="Тип палива" id="fuel_type">
                <option value="Дизель">Дизель</option>
                <option value="Бензин">Бензин</option>
                <option value="Газ">Газ</option>
            </select>
            <br />
            <label for="transmission">Тип коробки передач:</label>
            <select name="Тип коробки передач" id="transmission">
                <option value="Автоматична">Автоматична</option>
                <option value="Механічна">Механічна</option>
            </select>
            <br />
            <label for="color">Колір:</label>
            <input type="text" id="color" name="Колір" />
            <br />
            <label for="comfort">Комфорт:</label>
            <select name="Комфорт" id="comfort">
                <option value="Люк">Люк</option>
                <option value="Шкіряний салон">Шкіряний салон</option>
                <option value="Клімат контроль">Клімат контроль</option>
            </select>
            <p>
                <button type="submit">Пошук</button>
            </p>
        </form>
    </body>
</html>
